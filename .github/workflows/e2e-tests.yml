name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1-5'  # Nightly Mon–Fri at 2 AM UTC
  workflow_dispatch:
    inputs:
      app_path:
        description: 'Path to Electron .exe (relative to workspace root)'
        required: false
        default: 'app/app.exe'
      test_suite:
        description: 'Test suite to run (smoke | functional | all)'
        required: false
        default: 'all'

jobs:
  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  e2e:
    name: E2E Tests (Windows)
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        if: ${{ github.event.inputs.test_suite == 'smoke' || github.event.inputs.test_suite == '' }}
        env:
          CI: true
          ELECTRON_APP_PATH: ${{ github.event.inputs.app_path || 'app/app.exe' }}
        run: npm run test:smoke
        continue-on-error: true

      - name: Run all tests
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == '' || github.event_name != 'workflow_dispatch' }}
        env:
          CI: true
          ELECTRON_APP_PATH: ${{ github.event.inputs.app_path || 'app/app.exe' }}
        run: npm test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 30

      - name: Upload test results & screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: |
            test-results/
            test-results/screenshots/
          retention-days: 30

      - name: Test summary
        if: always()
        run: |
          echo "## Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Run: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- App path: ${{ github.event.inputs.app_path || 'app/app.exe' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts retained 30 days" >> $GITHUB_STEP_SUMMARY
        shell: bash
